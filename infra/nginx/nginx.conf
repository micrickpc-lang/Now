worker_processes auto;
events { worker_connections 2048; }
http {
  server_tokens off;
  limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
  limit_req_zone $binary_remote_addr zone=search:10m rate=3r/s;
  proxy_cache_path /var/cache/nginx/maps levels=1:2 keys_zone=maps:50m max_size=2g inactive=14d use_temp_path=off;
  map $http_upgrade $connection_upgrade { default upgrade; '' close; }

  server {
    listen 8080;
    client_max_body_size 6m;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;

    location /api/v1/maps/search { limit_req zone=search burst=5 nodelay; proxy_pass http://api:3000; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
    location /api/ { limit_req zone=api burst=40 nodelay; proxy_pass http://api:3000; proxy_http_version 1.1; proxy_set_header X-Forwarded-Proto $scheme; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
    location /realtime/ { proxy_pass http://api:3000; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection $connection_upgrade; }
    location /docs { proxy_pass http://api:3000; }
    location /health { proxy_pass http://api:3000; }
    location /admin { proxy_pass http://admin:3001; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /maps/assets/ { alias /srv/maps/assets/; add_header Cache-Control "public,max-age=31536000,immutable"; }
  }
}
