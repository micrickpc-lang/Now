name: ci
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  node:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgis/postgis:17-3.5
        env:
          POSTGRES_DB: seychas
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d seychas"
          --health-interval 5s --health-timeout 5s --health-retries 20
      redis:
        image: redis:8.2-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 20
    env:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/seychas?schema=public
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-only-jwt-secret-at-least-thirty-two-bytes
      TOKEN_HASH_SECRET: ci-only-token-hash-secret-at-least-thirty-two-bytes
      PHONE_HASH_SECRET: ci-only-phone-hash-secret-at-least-thirty-two-bytes
      LOCATION_MASTER_KEY_BASE64: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      ALLOW_DEV_OTP: "true"
      DEV_OTP_CODE: "123456"
      APP_ORIGINS: http://localhost:3001
      ADMIN_SESSION_SECRET: ci-only-admin-session-secret-at-least-thirty-two
      MINIO_ACCESS_KEY: ci-minio
      MINIO_SECRET_KEY: ci-minio-secret-not-used-without-media
      MINIO_ENDPOINT: localhost
      MINIO_PORT: "9000"
      MINIO_BUCKET: ci-media
      ALLOW_UNSCANNED_UPLOADS: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - run: npm ci
      - run: npm run db:generate
      - name: Validate and apply migrations
        run: npx prisma migrate deploy --config services/api/prisma.config.ts
      - run: npm run format:check
      - run: npm run lint --workspaces --if-present
      - run: npm run typecheck --workspaces --if-present
      - run: npm run test --workspace=@seychas/api
      - run: npm run test:integration --workspace=@seychas/api
      - run: npm run build --workspaces --if-present
      - run: npm run security:maps
      - run: npm run security:secrets
      - run: npm audit --audit-level=high

  flutter:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { flutter-version: "3.44.0", channel: stable, cache: true }
      - working-directory: apps/mobile
        run: flutter pub get
      - working-directory: apps/mobile
        run: dart format --output=none --set-exit-if-changed lib test
      - working-directory: apps/mobile
        run: flutter analyze
      - working-directory: apps/mobile
        run: flutter test --coverage
      - working-directory: apps/mobile
        run: flutter build appbundle --debug --dart-define=APP_ENV=development

  security:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

  containers:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          {
            context: .,
            file: services/api/Dockerfile,
            push: false,
            load: true,
            tags: seychas-api:ci,
          }
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: seychas-api:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
